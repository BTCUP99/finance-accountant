name: Build Windows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        working-directory: windows
        run: dotnet restore

      - name: Build Release
        working-directory: windows
        run: dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ./publish

      - name: Create zip archive
        working-directory: windows/publish
        run: Compress-Archive -Path .\* -DestinationPath ../FinanceAccountant-v1.0.0-win-x64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: windows/FinanceAccountant-v1.0.0-win-x64.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: .

      - name: Create Release
        env:
          TAG: ${{ github.ref_name }}
        run: |
          $version = $env:TAG -replace 'v', ''
          gh release create $env:TAG --title "财务记账工具 v$version" --notes "Windows 版本 v$version`n`n功能：`n- 记账（收入/支出分类）`n- 月度统计图表`n- 数据导出 CSV/Excel`n- 暗黑主题"
          gh release upload $env:TAG FinanceAccountant-v1.0.0-win-x64.zip